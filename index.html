<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clueless</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2e3244;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --hot:       #ef4444;
      --warm:      #f59e0b;
      --cool:      #3b82f6;
      --cold:      #64748b;
      --win:       #22c55e;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-h), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 0.6rem;
    }
    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }
    .input-row button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      transition: background 0.15s, opacity 0.15s;
    }
    .input-row button:hover:not(:disabled) { background: var(--accent-h); }
    .input-row button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Feedback banner ── */
    #feedback {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
    }
    #feedback.show { display: block; }
    #feedback.error  { background: #2d1a1a; color: #f87171; border: 1px solid #7f1d1d; }
    #feedback.result { background: #1a1f2e; color: var(--text);  border: 1px solid var(--border); }
    #feedback.win    { background: #14291e; color: var(--win);   border: 1px solid #166534; }

    /* ── Win overlay ── */
    #win-banner {
      display: none;
      text-align: center;
      margin-top: 1.2rem;
      padding: 1.2rem;
      border-radius: var(--radius);
      background: #14291e;
      border: 1px solid #166534;
      color: var(--win);
    }
    #win-banner.show { display: block; }
    #win-banner h2 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    #win-banner p  { font-size: 0.9rem; color: #86efac; }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .stats span { display: flex; align-items: center; gap: 0.3rem; }

    /* ── Guess list ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.6rem 0 0.7rem;
    }

    #guess-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 400px;
      overflow-y: auto;
    }
    #guess-list:empty::after {
      content: 'No guesses yet.';
      color: var(--muted);
      font-size: 0.85rem;
    }

    .guess-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.55rem 0.8rem;
      border-radius: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .guess-word {
      flex: 1;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .guess-bar-wrap {
      flex: 2;
      background: var(--border);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }
    .guess-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .guess-dist {
      font-size: 0.8rem;
      font-weight: 700;
      width: 3.8rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* temperature colour helpers */
    .hot  { color: var(--hot);  }
    .warm { color: var(--warm); }
    .cool { color: var(--cool); }
    .cold { color: var(--cold); }
    .win-color { color: var(--win); }

    .bg-hot  { background: var(--hot);  }
    .bg-warm { background: var(--warm); }
    .bg-cool { background: var(--cool); }
    .bg-cold { background: var(--cold); }
    .bg-win  { background: var(--win);  }

    /* ── Spoil button ── */
    #spoil-btn, #purge-btn {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #spoil-btn:hover  { border-color: var(--hot);  color: var(--hot);  }
    #purge-btn:hover  { border-color: var(--warm); color: var(--warm); }

    #spoil-answer {
      display: none;
      margin-top: 0.7rem;
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
    }
    #spoil-answer.show { display: block; }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 0.3rem; }
    .legend .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }

    /* ── User modal ── */
    #user-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #user-modal-overlay.hidden { display: none; }

    #user-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #user-modal h2 {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
    }
    #user-modal p {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .modal-btn-row {
      display: flex;
      gap: 0.7rem;
      margin-top: 0.3rem;
    }
    .modal-btn {
      flex: 1;
      padding: 0.7rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .modal-btn:hover { border-color: var(--accent); background: var(--surface); }
    .modal-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .modal-btn.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
    #modal-name-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #modal-name-input:focus { border-color: var(--accent); }
    #modal-name-input::placeholder { color: var(--muted); }
    #modal-error {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }
    #modal-back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      padding: 0;
    }
    #modal-back-btn:hover { color: var(--text); }

    /* ── User badge in header ── */
    #user-badge {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #user-badge button {
      background: none;
      border: none;
      color: var(--accent-h);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
      margin-left: 0.4rem;
    }
    #user-badge button:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ── User modal ── -->
<div id="user-modal-overlay">
  <div id="user-modal">
    <!-- Step 1: choose action -->
    <div id="modal-step-choose">
      <h2>Welcome to Clueless</h2>
      <p>How would you like to play?</p>
      <div class="modal-btn-row">
        <button class="modal-btn" id="modal-signin-btn">Sign In</button>
        <button class="modal-btn primary" id="modal-create-btn">New Player</button>
      </div>
    </div>
    <!-- Step 2: enter name -->
    <div id="modal-step-name" style="display:none">
      <h2 id="modal-step-title">Sign In</h2>
      <p id="modal-step-sub">Enter your username to continue.</p>
      <input id="modal-name-input" type="text" maxlength="30"
             placeholder="username" autocomplete="off" spellcheck="false" />
      <div id="modal-error"></div>
      <button class="modal-btn primary" id="modal-submit-btn">Continue</button>
      <button id="modal-back-btn">← back</button>
    </div>
  </div>
</div>

<header>
  <h1>Clueless</h1>
  <p id="date-label">Loading…</p>
  <p id="user-badge" style="display:none">
    Playing as <strong id="user-badge-name"></strong>
    <button id="switch-user-btn">switch</button>
  </p>
</header>

<div class="card">
  <form class="input-row" id="guess-form" autocomplete="off">
    <input
      id="guess-input"
      type="text"
      placeholder="Type a word and press Enter…"
      spellcheck="false"
      autofocus
    />
    <button type="submit" id="submit-btn">Guess</button>
  </form>

  <div id="feedback"></div>
  <div id="win-banner">
    <h2>You got it! 🎉</h2>
    <p id="win-msg"></p>
  </div>

  <div class="stats">
    <span>Guesses today: <strong id="stat-total">—</strong></span>
  </div>

  <div class="section-title">Today's Guesses</div>
  <div id="guess-list"></div>

  <div style="display:flex;gap:0.6rem;margin-top:1.2rem;">
    <button id="spoil-btn" style="flex:1">SPOIL ANSWER</button>
    <button id="purge-btn" style="flex:1">PURGE TODAY'S ATTEMPTS</button>
  </div>
  <div id="spoil-answer"></div>

  <div class="legend">
    <span><span class="dot bg-win"></span>Correct</span>
    <span><span class="dot bg-hot"></span>Hot (&lt; 5)</span>
    <span><span class="dot bg-warm"></span>Warm (5 – 19)</span>
    <span><span class="dot bg-cool"></span>Cool (20 – 49)</span>
    <span><span class="dot bg-cold"></span>Cold (&ge; 50)</span>
  </div>
</div>

<script>
  const API = '';
  // ── Current user (in-memory only — modal shown on every page load) ─────────

  let currentUser = null;

  function setStoredUser(username) {
    currentUser = username;
  }

  function clearStoredUser() {
    currentUser = null;
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function tempClass(score) {
    if (score === 0)   return 'win-color';
    if (score < 5)     return 'hot';
    if (score < 20)    return 'warm';
    if (score < 50)    return 'cool';
    return 'cold';
  }

  function tempBgClass(score) {
    if (score === 0)   return 'bg-win';
    if (score < 5)     return 'bg-hot';
    if (score < 20)    return 'bg-warm';
    if (score < 50)    return 'bg-cool';
    return 'bg-cold';
  }

  function tempLabel(score) {
    if (score === 0)   return '🎯 Correct!';
    if (score < 5)     return '🔥 Very hot';
    if (score < 20)    return '☀️  Warm';
    if (score < 50)    return '❄️  Cool';
    return '🧊 Cold';
  }

  function barWidth(score) {
    return Math.max(2, Math.round(100 * Math.exp(-score / 20)));
  }

  function buildRow(entry) {
    const row = document.createElement('div');
    row.className = 'guess-row';
    row.dataset.word = entry.word;

    const tc  = tempClass(entry.score);
    const bgc = tempBgClass(entry.score);
    const bw  = barWidth(entry.score);

    row.innerHTML = `
      <span class="guess-word ${tc}">${escapeHtml(entry.word)}</span>
      <div class="guess-bar-wrap">
        <div class="guess-bar ${bgc}" style="width:${bw}%"></div>
      </div>
      <span class="guess-dist ${tc}">${entry.score}</span>
    `;
    return row;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showFeedback(type, html) {
    const el = document.getElementById('feedback');
    el.className = `show ${type}`;
    el.innerHTML = html;
  }

  function hideFeedback() {
    document.getElementById('feedback').className = '';
  }

  // ── User modal ─────────────────────────────────────────────────────────────

  const overlay       = document.getElementById('user-modal-overlay');
  const stepChoose    = document.getElementById('modal-step-choose');
  const stepName      = document.getElementById('modal-step-name');
  const stepTitle     = document.getElementById('modal-step-title');
  const stepSub       = document.getElementById('modal-step-sub');
  const nameInput     = document.getElementById('modal-name-input');
  const modalError    = document.getElementById('modal-error');
  const submitBtn     = document.getElementById('modal-submit-btn');
  const backBtn       = document.getElementById('modal-back-btn');

  let modalMode = 'signin'; // 'signin' | 'create'

  function showModalChoose() {
    stepChoose.style.display = '';
    stepName.style.display = 'none';
    modalError.textContent = '';
    nameInput.value = '';
  }

  function showModalName(mode) {
    modalMode = mode;
    stepChoose.style.display = 'none';
    stepName.style.display = '';
    modalError.textContent = '';
    nameInput.value = '';
    if (mode === 'signin') {
      stepTitle.textContent = 'Sign In';
      stepSub.textContent = 'Enter your username to continue.';
      submitBtn.textContent = 'Sign In';
    } else {
      stepTitle.textContent = 'New Player';
      stepSub.textContent = 'Choose a username (letters, digits, hyphens, underscores).';
      submitBtn.textContent = 'Create Account';
    }
    setTimeout(() => nameInput.focus(), 50);
  }

  function hideModal() {
    overlay.classList.add('hidden');
  }

  function showModal() {
    overlay.classList.remove('hidden');
    showModalChoose();
  }

  document.getElementById('modal-signin-btn').addEventListener('click', () => showModalName('signin'));
  document.getElementById('modal-create-btn').addEventListener('click', () => showModalName('create'));
  backBtn.addEventListener('click', showModalChoose);

  submitBtn.addEventListener('click', handleModalSubmit);
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleModalSubmit();
  });

  async function handleModalSubmit() {
    const username = nameInput.value.trim().toLowerCase();
    modalError.textContent = '';

    if (!username) {
      modalError.textContent = 'Please enter a username.';
      return;
    }
    if (!/^[a-z0-9_-]{1,30}$/.test(username)) {
      modalError.textContent = 'Only letters, digits, hyphens, and underscores. Max 30 chars.';
      return;
    }

    submitBtn.disabled = true;

    try {
      if (modalMode === 'signin') {
        const res = await fetch(`${API}/users`);
        const data = await res.json();
        if (!data.users.includes(username)) {
          modalError.textContent = `No account found for "${username}". Try creating one.`;
          return;
        }
        setStoredUser(username);
        hideModal();
        initGame();

      } else {
        const res = await fetch(`${API}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          modalError.textContent = err?.detail ?? `Error ${res.status}`;
          return;
        }
        setStoredUser(username);
        hideModal();
        initGame();
      }
    } catch {
      modalError.textContent = 'Could not reach the API. Is the server running?';
    } finally {
      submitBtn.disabled = false;
    }
  }

  // ── Local guess state ──────────────────────────────────────────────────────

  let guessState = [];

  function upsertGuess(entry) {
    const idx = guessState.findIndex(g => g.word === entry.word);
    if (idx !== -1) guessState[idx] = entry;
    else guessState.push(entry);
    guessState.sort((a, b) => a.score - b.score);
  }

  function renderGuesses(guesses) {
    guessState = [...guesses].sort((a, b) => a.score - b.score);
    const list = document.getElementById('guess-list');
    list.innerHTML = '';
    guessState.forEach(g => list.appendChild(buildRow(g)));
    document.getElementById('stat-total').textContent = guessState.length;
  }

  function addGuess(entry) {
    upsertGuess(entry);
    const list = document.getElementById('guess-list');
    list.innerHTML = '';
    guessState.forEach(g => list.appendChild(buildRow(g)));
    document.getElementById('stat-total').textContent = guessState.length;
  }

  // ── Load initial state ─────────────────────────────────────────────────────

  async function loadStatus() {
    try {
      const [statusRes, guessesRes] = await Promise.all([
        fetch(`${API}/status?user_id=${encodeURIComponent(currentUser)}`),
        fetch(`${API}/guesses?user_id=${encodeURIComponent(currentUser)}`),
      ]);
      if (!statusRes.ok || !guessesRes.ok) throw new Error();

      const status  = await statusRes.json();
      const guesses = await guessesRes.json();

      document.getElementById('date-label').textContent =
        `${status.date} · guess the secret word`;

      renderGuesses(guesses.guesses);

      if (status.solved) showWin(guesses.guesses.length);
    } catch {
      document.getElementById('date-label').textContent =
        'Could not reach API — is the server running?';
    }
  }

  // ── Win state ──────────────────────────────────────────────────────────────

  function showWin(totalGuesses) {
    const banner = document.getElementById('win-banner');
    document.getElementById('win-msg').textContent =
      `Found in ${totalGuesses} guess${totalGuesses === 1 ? '' : 'es'}.`;
    banner.classList.add('show');
    document.getElementById('guess-input').disabled = true;
    document.getElementById('submit-btn').disabled = true;
  }

  // ── Form submit ────────────────────────────────────────────────────────────

  document.getElementById('guess-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const input = document.getElementById('guess-input');
    const btn   = document.getElementById('submit-btn');
    const word  = input.value.trim().toLowerCase();

    if (!word) return;

    btn.disabled = true;
    hideFeedback();

    try {
      const res = await fetch(`${API}/guess`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ word, user_id: currentUser }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showFeedback('error', err?.detail ?? `Error ${res.status}`);
        return;
      }

      const data = await res.json();
      addGuess(data);

      if (data.is_correct) {
        const total = document.getElementById('guess-list').children.length;
        showFeedback('win', `🎯 <strong>${data.word}</strong> is the secret word!`);
        showWin(total);
      } else {
        showFeedback(
          'result',
          `<span class="${tempClass(data.score)}">
            ${tempLabel(data.score)}
          </span>
          &nbsp;·&nbsp;
          <strong>${escapeHtml(data.word)}</strong>
          &nbsp; score: <strong>${data.score}</strong>`
        );
        input.value = '';
        input.focus();
      }
    } catch {
      showFeedback('error', 'Could not reach the API. Is the server running?');
    } finally {
      btn.disabled = false;
    }
  });

  // ── Purge cache ────────────────────────────────────────────────────────────

  document.getElementById('purge-btn').addEventListener('click', async () => {
    if (!confirm('Clear all of today\'s guesses?')) return;
    try {
      await fetch(`${API}/cache?user_id=${encodeURIComponent(currentUser)}`, { method: 'DELETE' });
      guessState = [];
      document.getElementById('guess-list').innerHTML = '';
      document.getElementById('stat-total').textContent = '0';
      document.getElementById('win-banner').classList.remove('show');
      document.getElementById('guess-input').disabled = false;
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('spoil-answer').classList.remove('show');
      document.getElementById('spoil-btn').textContent = 'SPOIL ANSWER';
      hideFeedback();
    } catch {
      showFeedback('error', 'Could not reach the API.');
    }
  });

  // ── Spoil answer ───────────────────────────────────────────────────────────

  document.getElementById('spoil-btn').addEventListener('click', async () => {
    const box = document.getElementById('spoil-answer');
    if (box.classList.contains('show')) {
      box.classList.remove('show');
      document.getElementById('spoil-btn').textContent = 'SPOIL ANSWER';
      return;
    }
    try {
      const res  = await fetch(`${API}/answer`);
      const data = await res.json();
      box.textContent = `Today's word: ${data.word}`;
      box.classList.add('show');
      document.getElementById('spoil-btn').textContent = 'HIDE ANSWER';
    } catch {
      box.textContent = 'Could not reach the API.';
      box.classList.add('show');
    }
  });

  // ── Switch user ────────────────────────────────────────────────────────────

  document.getElementById('switch-user-btn').addEventListener('click', () => {
    clearStoredUser();
    // Reset game UI
    guessState = [];
    document.getElementById('guess-list').innerHTML = '';
    document.getElementById('stat-total').textContent = '—';
    document.getElementById('date-label').textContent = 'Loading…';
    document.getElementById('win-banner').classList.remove('show');
    document.getElementById('guess-input').disabled = false;
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('spoil-answer').classList.remove('show');
    document.getElementById('spoil-btn').textContent = 'SPOIL ANSWER';
    document.getElementById('user-badge').style.display = 'none';
    hideFeedback();
    showModal();
  });

  // ── Init ───────────────────────────────────────────────────────────────────

  function initGame() {
    const badge = document.getElementById('user-badge');
    document.getElementById('user-badge-name').textContent = currentUser;
    badge.style.display = '';
    loadStatus();
  }

  // ── Boot ───────────────────────────────────────────────────────────────────

  showModal();
</script>
</body>
</html>
